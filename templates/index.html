<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Vibe Coding with Semgrep</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255, 82, 40, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(148, 0, 255, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 60% 80%, rgba(255, 136, 0, 0.1) 0%, transparent 60%);
      animation: bgPulse 6s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes bgPulse {
      0%   { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff6b35;
      border: 1px solid rgba(255, 107, 53, 0.4);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      animation: fadeSlideDown 0.8s ease both;
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      position: relative;
      animation: fadeSlideUp 0.9s ease 0.2s both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .word-secure {
      display: block;
      background: linear-gradient(90deg, #ff6b35, #ff9500, #ff6b35, #ff4500);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s linear infinite;
    }

    .word-vibe {
      display: block;
      background: linear-gradient(90deg, #ff9500, #ffcc00, #ff9500, #ff6b35);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s linear infinite reverse;
    }

    .word-coding {
      display: block;
      color: #f0f0f0;
      text-shadow: 0 0 40px rgba(255, 107, 53, 0.3);
    }

    .word-with {
      display: inline;
      font-size: 0.5em;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.1em;
    }

    .word-semgrep {
      display: block;
      background: linear-gradient(90deg, #ff4500, #ff6b35, #ff9a00, #ff6b35, #ff4500);
      background-size: 400% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 2s linear infinite;
      filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.6));
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* Glow pulse on the whole headline */
    .headline {
      animation: fadeSlideUp 0.9s ease 0.2s both, glowPulse 3s ease-in-out 1.5s infinite;
    }

    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.2)); }
      50%       { filter: drop-shadow(0 0 60px rgba(255, 107, 53, 0.55)); }
    }

    .subline {
      margin-top: 1.5rem;
      color: #666;
      font-size: 1rem;
      letter-spacing: 0.05em;
      animation: fadeSlideUp 0.9s ease 0.5s both;
    }

    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ff6b35;
      opacity: 0;
      animation: sparkle var(--dur, 4s) ease-in-out var(--delay, 0s) infinite;
    }

    .particle:nth-child(odd)  { background: #ff9500; width: 3px; height: 3px; }
    .particle:nth-child(3n)   { background: #ffcc00; width: 2px; height: 2px; }
    .particle:nth-child(5n)   { background: #ff4500; width: 5px; height: 5px; }

    @keyframes sparkle {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      20%  { opacity: 1; transform: translateY(-20px) scale(1); }
      80%  { opacity: 0.6; transform: translateY(var(--travel, -120px)) scale(0.6); }
      100% { opacity: 0; transform: translateY(var(--travel, -200px)) scale(0); }
    }

    /* Scanline shimmer overlay */
    .shimmer {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 107, 53, 0.015) 2px,
        rgba(255, 107, 53, 0.015) 4px
      );
      pointer-events: none;
      animation: shimmerMove 8s linear infinite;
    }

    @keyframes shimmerMove {
      from { background-position: 0 0; }
      to   { background-position: 0 200px; }
    }
  </style>
</head>
<body>

  <div class="shimmer"></div>

  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="badge">Static Analysis · Security · Speed</div>

    <h1 class="headline">
      <span class="word-secure">Secure</span>
      <span class="word-vibe">Vibe</span>
      <span class="word-coding">Coding</span>
      <span class="word-coding" style="font-size:0.45em; font-weight:400; color:#666; letter-spacing:0.15em;">with</span>
      <span class="word-semgrep">Semgrep</span>
    </h1>

    <p class="subline">Find bugs before attackers do &mdash; at the speed of thought.</p>
  </div>

  <script>
    const container = document.getElementById('particles');
    const count = 60;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = [
        `left: ${Math.random() * 100}%`,
        `top: ${40 + Math.random() * 40}%`,
        `--dur: ${3 + Math.random() * 5}s`,
        `--delay: ${Math.random() * 6}s`,
        `--travel: ${-(80 + Math.random() * 160)}px`,
      ].join(';');
      container.appendChild(p);
    }
  </script>
</body>
</html>
